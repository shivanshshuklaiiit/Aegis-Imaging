version: "3.9"
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - IRONLABS_API_KEY=${IRONLABS_API_KEY}
      - IRONLABS_BASE_URL=${IRONLABS_BASE_URL:-https://api.ironlabs.ai/v1}
      - IRONLABS_MODEL_CHEAP=${IRONLABS_MODEL_CHEAP:-llama-3.1-8b-instruct}
      - IRONLABS_MODEL_MID=${IRONLABS_MODEL_MID:-gpt-4o-mini}
      - IRONLABS_MODEL_TOP=${IRONLABS_MODEL_TOP:-claude-sonnet-4-5}
      - HF_TOKEN=${HF_TOKEN}
      - DATABASE_URL=data/aegis.db
      - DEMO_MODE=${DEMO_MODE:-false}
      - MOCK_EHR_URL=http://backend:8000/mock-ehr
      - MOCK_CLAIMS_URL=http://backend:8000/mock-claims
    volumes:
      - ./data:/app/data
      - ./demo:/app/demo
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE=http://localhost:8000
